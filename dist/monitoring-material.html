<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Material - MEGATAMA</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <!-- jsPDF & AutoTable (PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <!-- Main CSS -->
  <script type="module" crossorigin src="/assets/monitoringMaterial-CZXdrM1a.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/firebase-service-oQMaTyfC.js">
  <link rel="stylesheet" crossorigin href="/assets/firebase-service-B_F3xpz9.css">
</head>
<body class="min-h-screen bg-slate-50 dark:bg-[#0A0A0A] text-slate-800 dark:text-[#FFFFFF] transition-colors duration-300 font-['Inter']">

    <!-- Loading Indicator -->
    <div id="loading-indicator" class="fixed inset-0 bg-white dark:bg-[#0A0A0A] z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fas fa-spinner fa-spin text-4xl text-[#FF7A00] mb-4"></i>
        <p class="text-slate-500 dark:text-[#A1A1AA] font-medium">Memuat data material...</p>
    </div>

    <!-- Header -->
    <header class="bg-white dark:bg-[#1A1A1A] border-b border-slate-200 dark:border-[#2A2A2A] sticky top-0 z-40 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-[#121212] border border-slate-200 dark:border-[#2A2A2A] text-slate-500 dark:text-[#A1A1AA] hover:text-[#FF7A00] dark:hover:text-[#FF7A00] hover:border-[#FF7A00] dark:hover:border-[#FF7A00] flex items-center justify-center transition-all">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">Monitoring Material</h1>
                    <p id="header-project-name" class="text-xs text-slate-500 dark:text-[#A1A1AA]">Memuat proyek...</p>
                </div>
            </div>
            
            <!-- Admin Actions -->
            <div class="flex items-center gap-3" id="admin-actions" style="display: none;">
                <input type="file" id="import-excel-file" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleImportExcel(event)">
                <button onclick="showImportInstructions()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 md:px-4 rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(37,99,235,0.3)] transition-all flex items-center gap-2">
                    <i class="fas fa-file-import"></i> <span class="hidden sm:inline">Import Excel</span>
                </button>
                <button onclick="openAddMaterialModal()" class="bg-[#FF7A00] hover:bg-[#FFA726] text-white px-4 py-2 rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(255,122,0,0.3)] transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> Tambah Material
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 hidden" id="main-content">
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="material-stats">
            <!-- Stats diisi oleh JS -->
        </div>

        <!-- Material Table / Grid -->
        <div class="bg-white/80 dark:bg-[#1A1A1A]/80 backdrop-blur-md rounded-2xl border border-slate-200 dark:border-[#2A2A2A] overflow-hidden shadow-lg transition-colors duration-300">
            <div class="p-6 border-b border-slate-200 dark:border-[#2A2A2A] flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 bg-slate-50 dark:bg-[#121212] transition-colors duration-300">
                <h3 class="text-slate-800 dark:text-white font-semibold uppercase tracking-wider text-sm"><i class="fas fa-boxes mr-2 text-[#FF7A00]"></i>Daftar Kebutuhan Material</h3>
                <div class="flex flex-wrap items-center gap-2">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" oninput="filterBySearch(this.value)" placeholder="Cari Kode / Item..." class="bg-white dark:bg-[#1A1A1A] border border-slate-200 dark:border-[#2A2A2A] text-slate-800 dark:text-white text-xs rounded-lg pl-8 pr-3 py-1.5 focus:border-[#FF7A00] outline-none w-40 sm:w-52 shadow-sm transition-colors">
                    </div>
                    <select id="po-filter" onchange="filterByPoStatus(this.value)" class="bg-white dark:bg-[#1A1A1A] border border-slate-200 dark:border-[#2A2A2A] text-slate-800 dark:text-white text-xs rounded-lg px-3 py-1.5 focus:border-[#FF7A00] outline-none cursor-pointer shadow-sm">
                        <option value="All">Semua Status PO</option>
                        <option value="Belum PO">Hanya "Belum PO"</option>
                        <option value="Sudah PO belum Payment">Sudah PO belum Payment</option>
                        <option value="Sudah PO dan Payment">Sudah PO dan Payment</option>
                    </select>
                    <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button onclick="exportToPDF()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-2">
                        <i class="fas fa-file-pdf"></i> Export PDF
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="materials-table">
                    <!-- Tabel diisi oleh JS -->
                </table>
            </div>
        </div>
    </main>

</body>
</html>
